<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Profesores - ISW-711</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <h1>Lista de profesores</h1>

    <nav>
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="register.html">Registro</a></li>
        <li><a href="courses-list.html">Lista de Cursos</a></li>
        <li><a href="courses-create.html">Crear Curso</a></li>
        <li><a href="professors-list.html">Lista de Profesores</a></li>
      </ul>
    </nav>

    <div id="message" class="message"></div>

    <h2>Profesores registrados</h2>
    <div id="professorsList" class="professors-list">
      <div class="loading">Cargando profesores...</div>
    </div>
  </div>

  <script>
    const API_BASE_URL = 'http://localhost:3001';
    const AUTH_TOKEN_KEY = 'authToken';

    function requireAuth() {
      const token = sessionStorage.getItem(AUTH_TOKEN_KEY);
      if (!token) {
        window.location.href = 'login.html';
        return null;
      }
      return token;
    }

    window.onload = function () {
      loadProfessors();
    };

    function showMessage(text, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.textContent = text;
      messageDiv.className = `message ${type} show`;
      setTimeout(() => messageDiv.classList.remove('show'), 5000);
    }

    // Va al servidor a pedir la lista de profesores
    function loadProfessors() {
      const token = requireAuth();
      if (!token) return;

      const xhr = new XMLHttpRequest();
      xhr.open('GET', `${API_BASE_URL}/professor`);
      xhr.setRequestHeader('Authorization', `Bearer ${token}`);
      xhr.onload = function () {
        if (xhr.status === 200) {
          const professors = JSON.parse(xhr.responseText);
          displayProfessors(professors);
        } else {
          document.getElementById('professorsList').innerHTML = '<div class="message error show">Error al cargar profesores</div>';
        }
      };
      xhr.onerror = function () {
        document.getElementById('professorsList').innerHTML = '<div class="message error show">Error de conexión</div>';
      };
      xhr.send();
    }

    // Toma la lista de profesores y crea el HTML para cada uno
    function displayProfessors(professors) {
      const listEl = document.getElementById('professorsList');
      if (!professors || professors.length === 0) {
        listEl.innerHTML = '<p>No hay profesores registrados. Cree profesores mediante la API (POST /professor) para poder asignarlos a los cursos.</p>';
        return;
      }

      listEl.innerHTML = '';
      professors.forEach(prof => {
        const div = document.createElement('div');
        div.className = 'professor-item';
        div.innerHTML = `
          <h3>${prof.nombre} ${prof.apellidos}</h3>
          <p><strong>Cédula:</strong> ${prof.cedula}</p>
          <p><strong>Edad:</strong> ${prof.edad}</p>
        `;
        listEl.appendChild(div);
      });
    }
  </script>
</body>

</html>
