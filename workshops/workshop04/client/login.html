<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - ISW-711</title>
    <link rel="stylesheet" href="styles.css" />
    <script>
        const API_BASE = "http://localhost:3001";

        function showJSON(obj) {
            const el = document.getElementById("result");
            if (el) {
                el.textContent = JSON.stringify(obj, null, 2);
            }
        }

        async function login(event) {
            event.preventDefault();

            const email = document.getElementById("email")?.value.trim();
            const password = document.getElementById("password")?.value;

            if (!email || !password) {
                showJSON({ error: "Email y contraseña son requeridos." });
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/auth/token`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ email, password }),
                });

                const data = await response.json().catch(() => ({}));

                if (!response.ok) {
                    showJSON({
                        error: "Error de autenticación",
                        status: response.status,
                        ...(data || {}),
                    });
                    return;
                }

                if (data && data.token) {
                    sessionStorage.setItem("authToken", data.token);
                    window.location.href = "index.html";
                    return;
                }

                showJSON({ error: "La API no devolvió un token." });
            } catch (err) {
                showJSON({ error: "No se pudo conectar a la API", detail: String(err) });
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("loginForm");
            if (form) {
                form.addEventListener("submit", login);
            }
        });
    </script>
</head>

<body>
    <div class="auth-shell">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="auth-logo" aria-hidden="true"></div>
                <div>
                    <h1 class="auth-title">Iniciar sesión</h1>
                    <div class="auth-subtitle">Accedé con tu email y contraseña para usar los módulos.</div>
                </div>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" type="email" placeholder="tu@email" autocomplete="username" required />
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input id="password" type="password" placeholder="********" autocomplete="current-password" required />
                </div>

                <div class="auth-actions">
                    <button type="submit">Entrar</button>
                </div>
            </form>

            <div class="auth-meta">
                ¿No tienes cuenta? <a href="register.html">Registrarse</a>
            </div>

            <div class="auth-result" aria-live="polite">
                <pre id="result">{}</pre>
            </div>
        </div>
    </div>

</body>
</html>
