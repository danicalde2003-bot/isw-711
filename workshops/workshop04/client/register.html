<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro - ISW-711</title>
  <link rel="stylesheet" href="styles.css" />
  <script>
    const API_BASE = "http://localhost:3001";

    function showJSON(obj) {
      const el = document.getElementById("result");
      if (el) el.textContent = JSON.stringify(obj, null, 2);
    }

    async function register(event) {
      event.preventDefault();

      const name = document.getElementById("name")?.value.trim();
      const lastName = document.getElementById("lastName")?.value.trim();
      const email = document.getElementById("email")?.value.trim();
      const password = document.getElementById("password")?.value;

      if (!name || !lastName || !email || !password) {
        showJSON({ error: "Todos los campos son requeridos." });
        return;
      }

      try {
        const regRes = await fetch(`${API_BASE}/auth/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, lastName, email, password }),
        });

        const regData = await regRes.json().catch(() => ({}));
        if (!regRes.ok) {
          showJSON({ error: "No se pudo registrar", status: regRes.status, ...(regData || {}) });
          return;
        }

        // Auto-login para obtener token y guardarlo en Session Storage
        const tokenRes = await fetch(`${API_BASE}/auth/token`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        const tokenData = await tokenRes.json().catch(() => ({}));
        if (!tokenRes.ok || !tokenData?.token) {
          showJSON({
            registered: regData,
            warning: "Registrado, pero no se pudo iniciar sesión automáticamente.",
            tokenStatus: tokenRes.status,
            tokenResponse: tokenData,
          });
          return;
        }

        sessionStorage.setItem("authToken", tokenData.token);
        window.location.href = "index.html";
      } catch (err) {
        showJSON({ error: "No se pudo conectar a la API", detail: String(err) });
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("registerForm");
      if (form) form.addEventListener("submit", register);
    });
  </script>
</head>

<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-logo" aria-hidden="true"></div>
        <div>
          <h1 class="auth-title">Crear cuenta</h1>
          <div class="auth-subtitle">Completa tus datos para registrarte y obtener tu token.</div>
        </div>
      </div>

      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input id="name" type="text" placeholder="Tu nombre" autocomplete="given-name" required />
        </div>

        <div class="form-group">
          <label for="lastName">LastName</label>
          <input id="lastName" type="text" placeholder="Tus apellidos" autocomplete="family-name" required />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="tu@email" autocomplete="username" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="********" autocomplete="new-password" required />
        </div>

        <div class="auth-actions">
          <button type="submit">Crear cuenta</button>
        </div>
      </form>

      <div class="auth-meta">
        ¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a>
      </div>

      <div class="auth-result" aria-live="polite">
        <pre id="result">{}</pre>
      </div>
    </div>
  </div>
</body>

</html>
